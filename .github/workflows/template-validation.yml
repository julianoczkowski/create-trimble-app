name: Template Validation

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'templates/**'
      - 'src/**'

jobs:
  validate-react:
    name: React Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold React app
        run: node bin/create-trimble-app.js test-react-app --framework react --no-install

      - name: Install template dependencies
        working-directory: test-react-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-react-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-react-app
        run: npm run build

  validate-solidjs:
    name: SolidJS Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold SolidJS app
        run: node bin/create-trimble-app.js test-solidjs-app --framework solidjs --no-install

      - name: Install template dependencies
        working-directory: test-solidjs-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-solidjs-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-solidjs-app
        run: npm run build

  validate-angular:
    name: Angular Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold Angular app
        run: node bin/create-trimble-app.js test-angular-app --framework angular --no-install

      - name: Install template dependencies
        working-directory: test-angular-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-angular-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-angular-app
        run: npm run build
