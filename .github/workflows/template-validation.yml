name: Template Validation

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'templates/**'
      - 'src/**'

jobs:
  validate-react:
    name: React Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold React app
        run: node bin/create-trimble-app.js test-react-app --framework react --no-install

      - name: Install template dependencies
        working-directory: test-react-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-react-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-react-app
        run: npm run build

  validate-solidjs:
    name: SolidJS Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold SolidJS app
        run: node bin/create-trimble-app.js test-solidjs-app --framework solidjs --no-install

      - name: Install template dependencies
        working-directory: test-solidjs-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-solidjs-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-solidjs-app
        run: npm run build

  update-health-report:
    name: Update Health Report
    runs-on: ubuntu-latest
    needs: [validate-react, validate-solidjs, validate-angular]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate health report
        run: node scripts/generate-template-health.js

      - name: Commit health report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEMPLATE-HEALTH.md
          git diff --cached --quiet || git commit -m "docs: update template health report [skip ci]"
          git push

  validate-angular:
    name: Angular Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Scaffold Angular app
        run: node bin/create-trimble-app.js test-angular-app --framework angular --no-install

      - name: Install template dependencies
        working-directory: test-angular-app
        run: npm install

      - name: Run template lint checks
        working-directory: test-angular-app
        run: npm run lint:all

      - name: Build template
        working-directory: test-angular-app
        run: npm run build
