version: 2
updates:
  # CLI root dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10

  # React template dependencies
  - package-ecosystem: "npm"
    directory: "/templates/react"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-react):"
    labels:
      - "dependencies"
      - "react"
    open-pull-requests-limit: 10

  # Angular template dependencies
  - package-ecosystem: "npm"
    directory: "/templates/angular"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-angular):"
    labels:
      - "dependencies"
      - "angular"
    open-pull-requests-limit: 10

  # SolidJS template dependencies
  - package-ecosystem: "npm"
    directory: "/templates/solidjs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-solidjs):"
    labels:
      - "dependencies"
      - "solidjs"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions):"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
